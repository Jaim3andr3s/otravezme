# Blueprint de Render: permite crear el servicio del backend con un solo
# clic ("New +" → "Blueprint" → selecciona este repo) en vez de configurar
# cada campo a mano. Los valores marcados "sync: false" hay que pegarlos
# manualmente en el dashboard de Render la primera vez (son secretos, no
# deben vivir en el repo).
services:
  - type: web
    name: bibliosuenos-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_SEED_PASSWORD
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: PORT
        value: 4000
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
